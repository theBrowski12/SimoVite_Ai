spring.application.name=order-service
server.port= 8082

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/order_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.cloud.compatibility-verifier.enabled=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#Activer l'enregistrement
spring.cloud.discovery.enabled=true
# le service url
spring.cloud.openfeign.circuitbreaker.enabled=true

# Circuit Breaker config
resilience4j.circuitbreaker.instances.catalog-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.catalog-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.catalog-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.catalog-service.permitted-number-of-calls-in-half-open-state=3

eureka.client.service-url.defaultZone=${DISCOVERY_SERVICE_URL:http://localhost:8761/eureka}

#spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/SMAFly}

#enregistrer avec adresse IP.
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=*

#spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/SMAFly/protocol/openid-connect/certs

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
# Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# JSON Serialization
spring.kafka.producer.properties.spring.json.add.type.headers=false
# Autoriser la dķsķrialisation de tous les packages (trĶs utile en microservices)
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOACK_ISSUER:http://localhost:8080/realms/Simovite}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOACK_CERTS:http://localhost:8080/realms/Simovite/protocol/openid-connect/certs}
