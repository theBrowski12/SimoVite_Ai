  discovery-service:
    build:
      context: ./Discovery_Service
      dockerfile: Dockerfile
    container_name: simovite-discovery
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  config-service:
    build:
      context: ./Config_Service
      dockerfile: Dockerfile
    container_name: simovite-config
    ports:
      - "9999:9999"
    depends_on:
      discovery-service:
        condition: service_healthy
    environment:
      DISCOVERY_SERVICE_URL: http://discovery-service:8761/eureka
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9999/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  gateway-service:
    build:
      context: ./Gateway_service
      dockerfile: Dockerfile
    container_name: simovite-gateway
    ports:
      - "8888:8888"
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    environment:
      DISCOVERY_SERVICE_URL: http://discovery-service:8761/eureka
      KEYCLOACK_ISSUER: http://keycloak:8080/realms/Simovite
      KEYCLOACK_CERTS: http://keycloak:8080/realms/Simovite/protocol/openid-connect/certs
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: Simovite
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "keycloak:host-gateway"

  # ── Microservices ──────────────────────────────────────────

  catalog-service:
    build:
      context: ./Catalog_Service
      dockerfile: Dockerfile
    container_name: simovite-catalog
    ports:
      - "8081:8081"
    depends_on:
      config-service:
        condition: service_healthy
      mongodb:
        condition: service_started
      discovery-service:
        condition: service_healthy
    environment:
      DISCOVERY_SERVICE_URL: http://discovery-service:8761/eureka
      CONFIG_SERVICE_URL: http://config-service:9999
      MONGO_URI: mongodb://simovite-mongo:27017/simovite_catalog_db
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/Simovite
      KEYCLOAK_CERTS: http://keycloak:8080/realms/Simovite/protocol/openid-connect/certs
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      ETA_SERVICE_URL: http://simovite-eta:8085
    extra_hosts:
      - "keycloak:host-gateway"

  order-service:
    build:
      context: ./Order_Service
      dockerfile: Dockerfile
    container_name: simovite-order
    ports:
      - "8082:8082"
    depends_on:
      config-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      discovery-service:
        condition: service_healthy
    environment:
      DISCOVERY_SERVICE_URL: http://discovery-service:8761/eureka
      CONFIG_SERVICE_URL: http://config-service:9999
      DB_URL: jdbc:mysql://simovite-mysql:3306/order_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/Simovite
      KEYCLOAK_CERTS: http://keycloak:8080/realms/Simovite/protocol/openid-connect/certs
    extra_hosts:
      - "keycloak:host-gateway"

  delivery-service:
    build:
      context: ./Delivery_Service
      dockerfile: Dockerfile
    container_name: simovite-delivery
    ports:
      - "8083:8083"
    depends_on:
      config-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      discovery-service:
        condition: service_healthy
    environment:
      DISCOVERY_SERVICE_URL: http://discovery-service:8761/eureka
      CONFIG_SERVICE_URL: http://config-service:9999
      DB_URL: jdbc:mysql://simovite-mysql:3306/delivery_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: simovite-redis
      REDIS_PORT: 6379
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/Simovite
      KEYCLOAK_CERTS: http://keycloak:8080/realms/Simovite/protocol/openid-connect/certs
    extra_hosts:
      - "keycloak:host-gateway"

  notification-service:
    build:
      context: ./Notification_Service
      dockerfile: Dockerfile
    container_name: simovite-notification
    ports:
      - "8089:8089"
    depends_on:
      config-service:
        condition: service_healthy
      kafka:
        condition: service_started
      discovery-service:
        condition: service_healthy
    environment:
      DISCOVERY_SERVICE_URL: http://discovery-service:8761/eureka
      CONFIG_SERVICE_URL: http://config-service:9999
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    extra_hosts:
      - "keycloak:host-gateway"

  eta-service:
    build:
      context: ./ETA_Service
      dockerfile: Dockerfile
    container_name: simovite-eta
    ports:
      - "8085:8085"
    depends_on:
      discovery-service:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 8085
      EUREKA_INSTANCE_HOST: simovite-eta
      OPEN_METEO_URL: https://api.open-meteo.com/v1/forecast
      MODEL_PATH: model/eta_model.pkl
      ENCODER_PATH: model/label_encoder.pkl
      EUREKA_URL: http://discovery-service:8761/eureka
      DELIVERY_SERVICE_URL: http://simovite-delivery:8083
      HF_TOKEN: ${HF_TOKEN}
    extra_hosts:
      - "keycloak:host-gateway"

  # ── AI Chatbot ─────────────────────────────────────────────

  chatbot-service:
    build:
      context: ./SimoViteAI_ChatBot
      dockerfile: Dockerfile
    container_name: simovite-chatbot
    ports:
      - "8084:8084"
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      catalog-service:
        condition: service_started
    environment:
      DISCOVERY_SERVICE_URL: http://discovery-service:8761/eureka
      GROQ_SERVER: ${GROQ_SERVER}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      CATALOG_Service_URL: http://simovite-catalog:8081/mcp
    extra_hosts:
      - "keycloak:host-gateway"

