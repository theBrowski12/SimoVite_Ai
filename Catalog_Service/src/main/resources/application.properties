spring.application.name=catalog-service
server.port=8081
spring.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/simovite_catalog_db}

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
spring.cloud.discovery.enabled=true
eureka.client.service-url.defaultZone=${DISCOVERY_SERVICE_URL:http://localhost:8761/eureka}

management.endpoints.web.exposure.include=*

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

spring.ai.mcp.server.protocol=streamable

# Disable Discord bot for now
discord.token=${DISCORD_BOT_TOKEN}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOACK_ISSUER:http://localhost:8080/realms/Simovite}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOACK_CERTS:http://localhost:8080/realms/Simovite/protocol/openid-connect/certs}
