spring.application.name=Delivery_Service
server.port=8083

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/delivery_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.cloud.compatibility-verifier.enabled=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#Activer l'enregistrement
spring.cloud.discovery.enabled=true
# le service url

eureka.client.service-url.defaultZone=${DISCOVERY_SERVICE_URL:http://localhost:8761/eureka}

#spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/SMAFly}

#enregistrer avec adresse IP.
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=*

#spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/SMAFly/protocol/openid-connect/certs

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
# Producer & consumer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
# JSON Serialization
spring.kafka.producer.properties.spring.json.add.type.headers=false
# Autoriser la dķsķrialisation de tous les packages (trĶs utile en microservices)
spring.kafka.consumer.properties.spring.json.trusted.packages=*
