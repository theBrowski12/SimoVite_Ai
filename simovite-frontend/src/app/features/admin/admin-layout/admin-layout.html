<div class="admin-wrapper">
  <app-sidebar class="sidebar-aside"></app-sidebar>

  <main class="main">
    <header class="topbar">
      <div class="topbar-greeting">
        {{ greeting }}, <span>{{ adminName }}</span> 👋
      </div>

      <div class="topbar-actions">
        <!-- App View Switcher -->
        <div class="view-wrap" (clickOutside)="isViewOpen = false">
          <button class="view-btn" [class.active]="isViewOpen" (click)="isViewOpen = !isViewOpen">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            <span>Views</span>
            <svg class="chevron" [class.open]="isViewOpen" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>

          <div class="dropdown" *ngIf="isViewOpen">
            <div class="dropdown-label">Switch view</div>

            <button class="view-item" routerLink="/home">
              <div class="view-dot dot-client">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#178DDC" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
              </div>
              <div class="view-meta">
                <div class="view-meta-name">Client view</div>
                <div class="view-meta-desc">Browse as a customer</div>
              </div>
              <svg class="ext-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </button>

            <button class="view-item" routerLink="/courier/dashboard">
              <div class="view-dot dot-courier">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FF6B35" stroke-width="2">
                  <rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>
                  <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
                </svg>
              </div>
              <div class="view-meta">
                <div class="view-meta-name">Courier view</div>
                <div class="view-meta-desc">Delivery dashboard</div>
              </div>
              <svg class="ext-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </button>

            <button class="view-item" routerLink="/owner/dashboard">
              <div class="view-dot dot-owner">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2">
                  <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
                  <path d="M16 10a4 4 0 0 1-8 0"/>
                </svg>
              </div>
              <div class="view-meta">
                <div class="view-meta-name">Store owner view</div>
                <div class="view-meta-desc">Manage your store</div>
              </div>
              <svg class="ext-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="topbar-search" [class.focused]="isSearching">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" placeholder="Search orders, stores, couriers..."
                 (focus)="isSearching = true" (blur)="isSearching = false"
                 (input)="onSearch($event)" [value]="searchTerm">
          <button class="search-clear" *ngIf="searchTerm" (click)="clearSearch()">×</button>
        </div>

        <button class="notif-btn" title="Notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
          <div class="notif-badge"></div>
        </button>

        <div class="topbar-user" [routerLink]="['/admin/account']" title="Account Settings">
          <div class="topbar-avatar">{{ adminInitials }}</div>
          <div class="user-meta">
            <span class="user-name">{{ adminName }}</span>
            <span class="user-email">{{ adminEmail }}</span>
          </div>
          <svg class="user-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>

        <button class="logout-btn" (click)="logout()" title="Sign Out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
