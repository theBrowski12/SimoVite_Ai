<div class="page active">
  <div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
    <div class="header-text">
      <div class="page-title">Stores Management</div>
      <div class="page-subtitle">Manage all registered stores</div>
    </div>
    <button class="btn-primary" (click)="openCreateModal()">+ Add New Store</button>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <select [(ngModel)]="filterCategory" (change)="applyFilters()" class="filter-select">
        <option value="">All Categories</option>
        <option value="RESTAURANT">Restaurant</option>
        <option value="PHARMACY">Pharmacy</option>
        <option value="SUPERMARKET">Supermarket</option>
        <option value="SPECIAL_DELIVERY">Special Delivery</option>
      </select>
      
      <select [(ngModel)]="filterStatus" (change)="applyFilters()" class="filter-select">
        <option value="">All Status</option>
        <option value="open">Open</option>
        <option value="closed">Closed</option>
      </select>
    </div>

    <div class="search-wrapper">
      <span class="search-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </span>
      <input [(ngModel)]="searchTerm" (input)="applyFilters()" placeholder="Search stores..." class="search-input">
    </div>

    <button class="btn-reset" (click)="reset()">Reset</button>
  </div>

  <div class="loading-state" *ngIf="loading">
    <p>Chargement des magasins en cours...</p>
  </div>

  <div *ngIf="!loading">
    <div class="stores-grid">
      <div class="store-card" *ngFor="let s of filtered">
        
        <div class="store-img-container" style="position: relative;">
          <div class="card-actions-overlay">
            <button class="action-btn edit" (click)="openEditModal(s)" title="Edit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
            </button>
            <button class="action-btn delete" (click)="deleteStore(s.id, s.name)" title="Delete">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
              </svg>
            </button>
          </div>

          <img *ngIf="s.imageURL" [src]="s.imageURL" [alt]="s.name" class="store-photo">
          <img *ngIf="!s.imageURL" src="assets/images/default-store.png" class="store-photo placeholder" alt="default">
        </div>

        <div class="store-body">
          <div class="store-name">{{ s.name }}</div>
          
          <div class="badge" [ngClass]="'badge-' + getCategoryClass(s.category)">
            {{ s.category }}
          </div>

          <div class="store-meta">
            <div class="store-rating">
              <span style="color: #F59E0B;">{{ getStars(s['rating']) }}</span>
              <span style="color: gray; font-size: 12px; margin-left: 4px;">({{ s['reviewCount'] || 0 }})</span>
            </div>
            
            <div style="display: flex; align-items: center; gap: 8px;">
              <span [style.color]="s.open ? '#10b981' : '#ef4444'" style="font-size: 13px; font-weight: 600;">
                {{ s.open ? 'Open' : 'Closed' }}
              </span>
              
              <div class="toggle" [class.on]="s.open" (click)="toggleStoreStatus(s.id)"></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="empty-state" *ngIf="filtered.length === 0">
      <p>Aucun magasin trouvé avec ces critères.</p>
    </div>
  </div>
</div>

<div class="modal-overlay" *ngIf="showModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>{{ isEditing ? 'Edit Store' : 'Create New Store' }}</h2>
      <button class="close-btn" (click)="closeModal()">✕</button>
    </div>

    <form [formGroup]="storeForm" (ngSubmit)="saveStore()">
      <div class="form-grid">
        <div class="form-group full-width">
          <label>Store Name *</label>
          <input type="text" formControlName="name" placeholder="e.g. Pizza Maarif" class="form-input">
        </div>

        <div class="form-group">
          <label>Category *</label>
          <select formControlName="category" class="form-input">
            <option value="RESTAURANT">Restaurant</option>
            <option value="PHARMACY">Pharmacy</option>
            <option value="SUPERMARKET">Supermarket</option>
            <option value="SPECIAL_DELIVERY">Special Delivery</option>
          </select>
        </div>

        <div class="form-group">
          <label>Phone Number *</label>
          <input type="text" formControlName="phone" placeholder="+212..." class="form-input">
        </div>

        <div class="form-group full-width">
          <label>Description</label>
          <textarea formControlName="description" placeholder="Short description..." class="form-input" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label>City *</label>
          <input type="text" formControlName="city" placeholder="Casablanca" class="form-input">
        </div>

        <div class="form-group">
          <label>Street Address *</label>
          <input type="text" formControlName="street" placeholder="123 Main St" class="form-input">
        </div>

        <div class="form-group">
          <label>Building Number</label>
          <input type="text" formControlName="buildingNumber" placeholder="e.g. 15B" class="form-input">
        </div>

        <div class="form-group">
          <label>Apartment</label>
          <input type="text" formControlName="apartment" placeholder="e.g. Apt 4" class="form-input">
        </div>

        <div class="form-group full-width">
          
          <div class="map-search-wrapper">
            <span class="search-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </span>
            <input type="text" 
                   #addressSearch 
                   placeholder="Taper une adresse (ex: Maarif, Casablanca)" 
                   class="form-input search-input-map"
                   (keydown.enter)="$event.preventDefault(); searchAddress(addressSearch.value)">
            
            <button type="button" class="btn-search-map" (click)="searchAddress(addressSearch.value)">
              Chercher
            </button>
          </div>

          <div id="map" class="map-container"></div>
        </div>

        <div class="form-group">
          <label>Latitude</label>
          <input type="number" formControlName="latitude" class="form-input readonly-input" readonly>
        </div>

        <div class="form-group">
          <label>Longitude</label>
          <input type="number" formControlName="longitude" class="form-input readonly-input" readonly>
        </div>

        <div class="form-group full-width">
          <label>Image URL</label>
          <input type="text" formControlName="imageURL" placeholder="https://mon-site.com/photo-magasin.jpg" class="form-input">
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-cancel" (click)="closeModal()">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="storeForm.invalid">
          {{ isEditing ? 'Update Store' : 'Create Store' }}
        </button>
      </div>
    </form>
  </div>
</div>
