<div class="notification-bell" (clickOutside)="closeDropdown()">
  <!-- Bell Icon -->
  <button class="bell-btn" (click)="toggleDropdown()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
  </button>

  <!-- Dropdown Panel -->
  <div class="notif-dropdown" *ngIf="showDropdown">
    <div class="dropdown-header">
      <h3>Notifications</h3>
      <div class="header-actions">
        <button class="action-btn" (click)="markAllAsRead()" *ngIf="unreadCount > 0">
          Mark all read
        </button>
        <button class="action-btn" (click)="clearAll()" *ngIf="notifications.length > 0">
          Clear all
        </button>
      </div>
    </div>

    <div class="notif-list" *ngIf="notifications.length > 0; else emptyState">
      <div class="notif-item" *ngFor="let notif of notifications"
           [class.unread]="notif.status === 'unread'"
           (click)="markAsRead(notif.id)">
        <div class="notif-icon">{{ getIcon(notif.type) }}</div>
        <div class="notif-content">
          <div class="notif-header">
            <span class="notif-title">{{ notif.title }}</span>
            <button class="remove-btn" (click)="removeNotification(notif.id); $event.stopPropagation()">×</button>
          </div>
          <p class="notif-message">{{ notif.message }}</p>
          <span class="notif-time">{{ getTimeAgo(notif.createdAt) }}</span>
        </div>
      </div>
    </div>

    <ng-template #emptyState>
      <div class="empty-notif">
        <span class="empty-icon">🔔</span>
        <p>No notifications yet</p>
      </div>
    </ng-template>
  </div>
</div>
