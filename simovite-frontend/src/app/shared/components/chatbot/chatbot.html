<!-- ── FAB trigger ── -->
<button class="chat-fab" (click)="toggle()" [class.open]="isOpen" aria-label="Open chat">
  <span class="fab-icon" *ngIf="!isOpen">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </span>
  <span class="fab-icon" *ngIf="isOpen">✕</span>
  <span class="fab-badge" *ngIf="unreadCount > 0 && !isOpen">{{ unreadCount }}</span>
</button>

<!-- ── Chat window ── -->
<div class="chat-window" [class.visible]="isOpen">

  <!-- Header -->
  <div class="chat-header">
    <div class="bot-avatar">🤖</div>
    <div class="bot-info">
      <div class="bot-name">SimoBot</div>
      <div class="bot-status">
        <span class="status-dot"></span>
        {{ isTyping ? 'En train d\'écrire…' : 'En ligne' }}
      </div>
    </div>
    <div class="header-actions">
      <button class="hdr-btn" (click)="clearHistory()" title="Nouvelle conversation">↺</button>
      <button class="hdr-btn" (click)="close()" title="Fermer">✕</button>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages">

    <!-- Suggestions -->
    <div class="suggestions" *ngIf="showSuggestions && messages.length <= 1">
      <button
        *ngFor="let s of suggestions"
        class="suggestion-chip"
        (click)="send(s)">
        {{ s }}
      </button>
    </div>

    <!-- Message list -->
    <div *ngFor="let msg of messages" class="msg-row" [class.user-row]="msg.role === 'user'">

      <div class="msg-avatar" *ngIf="msg.role === 'bot'">🤖</div>

      <div class="msg-bubble" [class.user-bubble]="msg.role === 'user'"
                              [class.bot-bubble]="msg.role === 'bot'">

        <!-- Loading dots -->
        <div class="typing-dots" *ngIf="msg.loading">
          <span></span><span></span><span></span>
        </div>

        <!-- Content -->
        <span *ngIf="!msg.loading"
              [innerHTML]="formatContent(msg.content)">
        </span>

        <div class="msg-time">{{ formatTime(msg.timestamp) }}</div>
      </div>

    </div>

    <div #messagesEnd></div>
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <textarea
      #inputRef
      class="chat-input"
      [(ngModel)]="inputText"
      (keydown)="onKeydown($event)"
      placeholder="Écris ton message…"
      rows="1">
    </textarea>
    <button class="send-btn" (click)="send()" [disabled]="!inputText.trim() || isTyping">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

</div>
